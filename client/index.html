<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Receipt Parser</title>
    <link rel="icon" href="favicon.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="app-bg">

    <div class="container-fluid vh-100">
        <div class="row h-100">

            <!-- LEFT PANEL -->
            <div class="col-md-4 d-flex align-items-center justify-content-center sidebar">

                <div class="card upload-card shadow-lg border-0">

                    <div class="text-center mb-3">
                        <div class="logo">🧾</div>
                        <h4 class="fw-bold mt-2">Receipt Parser</h4>
                        <p class="text-muted small">AI extracts structured data</p>
                    </div>

                    <form id="uploadForm">

                        <input type="file" id="fileInput" accept="image/png, image/jpeg" hidden />

                        <label for="fileInput" class="upload-box">

                            <i class="fa-solid fa-cloud-arrow-up icon"></i>

                            <div class="mt-2 fw-semibold">Upload Receipt</div>
                            <div class="text-muted small">PNG or JPG supported</div>

                        </label>

                        <p id="fileName" class="file-name"></p>

                        <button class="btn btn-primary w-100 mt-3">
                            Parse Receipt
                        </button>

                    </form>

                </div>

            </div>

            <!-- RIGHT PANEL -->
            <div class="col-md-8 p-4 result-area">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="fw-bold">Parsed Result</h3>

                    <!-- <button id="copyBtn" class="btn btn-dark btn-sm">
                        Copy JSON
                    </button> -->
                </div>

                <div id="resultCard" class="result-card shadow-sm">
                    <div class="empty">
                        <div class="emoji">📄</div>
                        <p>No receipt parsed yet</p>
                    </div>
                </div>

            </div>

        </div>
    </div>

</body>
<script src="js/script.js"></script>


</html>
